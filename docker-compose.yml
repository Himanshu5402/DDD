# Production/staging infra for ITSYBIZZ Command Center.
# Not needed when using MongoDB Atlas — the server reads MONGODB_URI
# from server/.env and treats Redis as optional.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: itsybizzz
      MONGO_INITDB_ROOT_PASSWORD: itsybizzz
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
